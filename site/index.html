<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>US Stock Momentum Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Inter, Segoe UI, sans-serif; margin: 0; background: #0b1020; color: #edf2ff; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
    .panel { background: #121933; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 18px; }
    p { color: #b6c2e2; line-height: 1.5; }
    code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>US Stock Momentum Dashboard</h1>
      <p>The dashboard will be generated by <code>generate_dashboard.py</code> during the first successful run.</p>
      <p>After GitHub Actions runs, this page will show the daily top 20 12-1 momentum names for the editable stock universe.</p>
    </div>
  </div>
</body>
</html>
